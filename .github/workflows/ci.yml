name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install common Python deps
        run: |
          pip install flake8 black pytest pytest-cov pytest-asyncio anyio httpx mypy bandit

      - name: Install per-service deps
        run: |
          for svc in fabric fusion intelligence tasking api-gateway inference; do
            if [ -f "apps/$svc/requirements.txt" ]; then
              pip install -r "apps/$svc/requirements.txt"
            fi
          done
          pip install fastapi uvicorn sqlalchemy aiosqlite pydantic httpx prometheus-client cryptography

      - name: Install SDK optional deps
        run: |
          # SDK is imported via PYTHONPATH — no pip install needed
          # Optional hardware library deps: install what's available, skip the rest
          pip install pymodbus asyncua pymavlink pynacl || true

      - name: Vulnerability scan (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit \
            -r apps/api-gateway/requirements.txt \
            -r apps/fabric/requirements.txt \
            -r apps/fusion/requirements.txt \
            -r apps/intelligence/requirements.txt \
            -r apps/tasking/requirements.txt \
            -r apps/inference/requirements.txt \
            --desc on \
            --format columns \
            || echo "pip-audit found vulnerabilities — review before merge"

      - name: Lint Python services (advisory)
        run: |
          flake8 apps/fabric apps/fusion apps/intelligence apps/tasking apps/api-gateway apps/inference \
            --max-line-length=120 \
            --extend-ignore=E302,E303,E402,E501,W291,W292,W293,W391,F401 \
            --exit-zero

      - name: Lint adapters and packages (advisory)
        run: |
          flake8 adapters/ packages/ \
            --max-line-length=120 \
            --extend-ignore=E302,E303,E402,E501,W291,W292,W293,W391,F401 \
            --exit-zero

      - name: Format check (advisory)
        continue-on-error: true
        run: |
          black --check --diff \
            apps/fabric apps/fusion apps/intelligence apps/tasking apps/api-gateway apps/inference \
            adapters/ packages/ \
            || echo 'Format drift detected — run: black adapters/ packages/ apps/'

      - name: Security scan (bandit)
        continue-on-error: true
        run: |
          bandit -r apps/ packages/ adapters/ \
            -ll \
            --exclude apps/console \
            -f txt \
            || echo 'Bandit findings above — review before merge'

      - name: Node setup (console)
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20'

      - name: Install console deps
        run: |
          cd apps/console
          npm ci

      - name: Console lint and typecheck
        run: |
          cd apps/console
          npm run lint
          npm run typecheck

      - name: Console unit tests
        run: |
          cd apps/console
          npm test

      - name: Validate SDK import
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: |
          python -c "
          from sdk import BaseAdapter, AdapterManifest, EntityBuilder, Protocol, Capability
          from sdk.manifest import Protocol, Capability
          from sdk.entity import EntityBuilder
          print('SDK import OK — BaseAdapter, AdapterManifest, EntityBuilder all importable')
          "

      - name: Run unit tests (SDK, rate limiter, policy signer)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=packages/sdk \
            --cov=apps/fabric \
            --cov=packages/policy \
            --cov=packages/secrets \
            --cov=packages/identity \
            --cov-report=term-missing \
            -p no:warnings

      - name: Run adapter simulation tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENSKY_ENABLED: "true"
          CELESTRAK_ENABLED: "true"
          MODBUS_ENABLED: "true"
          OPCUA_ENABLED: "true"
          MAVLINK_ENABLED: "true"
        run: |
          python -m pytest tests/unit/test_adapters.py -v --tb=short -p no:warnings

      - name: Run per-service unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          for svc in fabric fusion intelligence tasking api-gateway; do
            if [ -d "apps/$svc/tests" ]; then
              echo "--- Testing $svc ---"
              cd apps/$svc && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../..
            fi
          done

      - name: Run WorldStore and packages tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest packages/ -v --tb=short \
            --ignore=packages/sdk \
            --ignore=packages/summit-sdk \
            --ignore=packages/summit-os-sdk \
            || true

      - name: mypy (advisory)
        continue-on-error: true
        run: make mypy || true

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/integration/test_e2e_pipeline.py -v --tb=short

      - name: Run stable E2E tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          GATEWAY_TEST_MODE: "true"
          SUMMIT_CA_CERT: /tmp/summit-certs/summit-ca.crt
          SUMMIT_CA_KEY: /tmp/summit-certs/summit-ca.key
        run: |
          mkdir -p /tmp/summit-certs
          python -m pytest tests/e2e/test_api_version.py \
                           tests/e2e/test_device_identity.py \
            -v --tb=short

      - name: Run live-stack E2E tests (optional)
        env:
          PYTHONPATH: ${{ github.workspace }}
          GATEWAY_TEST_MODE: "true"
        run: |
          python -m pytest tests/e2e/test_gateway_live.py \
            -v --tb=short || true

      - name: Summary
        run: echo "CI completed"

  release:
    runs-on: ubuntu-latest
    needs: lint-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build SDK wheel
        run: python -m build packages/sdk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/sdk/dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
