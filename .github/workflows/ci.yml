name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install common Python deps
        run: |
          pip install flake8 black pytest pytest-cov pytest-asyncio anyio httpx mypy

      - name: Install per-service deps
        run: |
          for svc in fabric fusion intelligence tasking api-gateway; do
            if [ -f "apps/$svc/requirements.txt" ]; then
              pip install -r "apps/$svc/requirements.txt"
            fi
          done
          # FastAPI / SQLAlchemy / Pydantic are required by all services
          pip install fastapi uvicorn sqlalchemy aiosqlite pydantic httpx prometheus-client

      - name: Lint Python services (advisory)
        run: |
          flake8 apps/fabric apps/fusion apps/intelligence apps/tasking apps/api-gateway \
            --max-line-length=120 \
            --extend-ignore=E302,E303,E402,E501,W291,W292,W293,W391,F401 \
            --exit-zero

      - name: Format check (advisory)
        continue-on-error: true
        run: |
          black --check --diff apps/fabric apps/fusion apps/intelligence apps/tasking apps/api-gateway || echo 'Format drift detected — run make format to fix'

      - name: Node setup (console)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install console deps
        run: |
          cd apps/console
          npm ci

      - name: Console lint and typecheck
        run: |
          cd apps/console
          npm run lint
          npm run typecheck

      - name: Run unit tests with coverage
        run: |
          cd apps/fabric && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../.. 
          cd apps/fusion && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../.. 
          cd apps/intelligence && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../.. 
          cd apps/tasking && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../.. 
          cd apps/api-gateway && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing && cd ../.. 

      - name: mypy (continue on error)
        run: make mypy || true

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/integration/test_e2e_pipeline.py -v --tb=short

      - name: Validate SDK packaging
        run: |
          pip install -e packages/summit-sdk
          python -c "import sys; sys.path.insert(0,'.'); from packages.summit_sdk import SummitClient, RetryPolicy, CircuitBreaker, SummitError; print('SDK import OK')"

      - name: Run E2E gateway tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          GATEWAY_TEST_MODE: "true"
        run: |
          pip install anyio
          python -m pytest tests/e2e/test_gateway_live.py -v --tb=short || true

      - name: Summary
        run: echo "CI completed"

  release:
    runs-on: ubuntu-latest
    needs: lint-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build SDK wheel
        run: python -m build packages/summit-sdk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/summit-sdk/dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
