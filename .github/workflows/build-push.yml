name: build-push

# Builds all Docker images and pushes to GitHub Container Registry (GHCR).
# Runs on every push to main and on version tags (v*).
#
# Images pushed:
#   ghcr.io/bigmt-ai/summit-os/console:latest      (and :<sha>)
#   ghcr.io/bigmt-ai/summit-os/api-gateway:latest
#   ghcr.io/bigmt-ai/summit-os/fabric:latest
#   ghcr.io/bigmt-ai/summit-os/fusion:latest
#   ghcr.io/bigmt-ai/summit-os/intelligence:latest
#   ghcr.io/bigmt-ai/summit-os/tasking:latest
#   ghcr.io/bigmt-ai/summit-os/inference:latest
#
# Required repository secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN  — a GitHub PAT with write:packages scope
#               (or just use GITHUB_TOKEN if the org allows it)
#
# The Coolify compose file references these images via:
#   image: ${CONSOLE_IMAGE:-ghcr.io/bigmt-ai/summit-os/console:latest}

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  ORG: bigmt-ai
  REPO: summit-os

jobs:
  # ── Console (Next.js) ────────────────────────────────────────────────────────
  build-console:
    name: Build console
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/console
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/console
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=console
          cache-to: type=gha,mode=max,scope=console
          platforms: linux/amd64,linux/arm64

  # ── Python microservices (matrix) ────────────────────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - fabric
          - fusion
          - intelligence
          - tasking
          - inference
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.REPO }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-console, build-services]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Image Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| console | ${{ needs.build-console.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| services (matrix) | ${{ needs.build-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to: \`ghcr.io/bigmt-ai/summit-os/*:latest\`" >> $GITHUB_STEP_SUMMARY
