apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "summit-os.fullname" . }}-tasking
  labels:
    {{- include "summit-os.labels" . | nindent 4 }}
    app: tasking
spec:
  replicas: {{ .Values.tasking.replicas }}
  selector:
    matchLabels:
      app: tasking
  template:
    metadata:
      labels:
        app: tasking
    spec:
      containers:
        - name: tasking
          image: {{ .Values.global.image.registry }}{{ .Values.tasking.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.tasking.port }}
          resources:
            {{- toYaml .Values.tasking.resources | nindent 12 }}
          env:
            - name: REDIS_URL
              value: {{ .Values.global.env.REDIS_URL | quote }}
            - name: FABRIC_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "summit-os.configmapName" . }}
                  key: FABRIC_URL
            - name: INFERENCE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "summit-os.configmapName" . }}
                  key: INFERENCE_URL
            - name: OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "summit-os.configmapName" . }}
                  key: OTLP_ENDPOINT
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "summit-os.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@{{ include "summit-os.fullname" . }}-postgres:5432/summit_os"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.tasking.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.tasking.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "summit-os.fullname" . }}-tasking
  labels:
    {{- include "summit-os.labels" . | nindent 4 }}
spec:
  selector:
    app: tasking
  ports:
    - name: http
      port: {{ .Values.tasking.port }}
      targetPort: {{ .Values.tasking.port }}
