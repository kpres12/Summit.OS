apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "heli-os.fullname" . }}-inference
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
    app: inference
spec:
  replicas: {{ .Values.inference.replicas }}
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
        - name: inference
          image: {{ .Values.global.image.registry }}{{ .Values.inference.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.inference.port }}
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
          env:
            {{- if .Values.inference.env }}
            {{- range $k, $v := .Values.inference.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            - name: OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: OTLP_ENDPOINT
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.inference.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.inference.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heli-os.fullname" . }}-inference
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
spec:
  selector:
    app: inference
  ports:
    - name: http
      port: {{ .Values.inference.port }}
      targetPort: {{ .Values.inference.port }}
