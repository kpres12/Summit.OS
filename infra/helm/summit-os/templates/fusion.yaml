apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "heli-os.fullname" . }}-fusion
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
    app: fusion
spec:
  replicas: {{ .Values.fusion.replicas }}
  selector:
    matchLabels:
      app: fusion
  template:
    metadata:
      labels:
        app: fusion
    spec:
      securityContext:
        {{- include "summit-os.podSecurityContext" . | nindent 8 }}
      containers:
        - name: fusion
          image: {{ .Values.global.image.registry }}{{ .Values.fusion.image }}
          securityContext:
            {{- include "summit-os.containerSecurityContext" . | nindent 12 }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.fusion.port }}
          resources:
            {{- toYaml .Values.fusion.resources | nindent 12 }}
          env:
            - name: REDIS_URL
              value: {{ .Values.global.env.REDIS_URL | quote }}
            - name: OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: OTLP_ENDPOINT
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "heli-os.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@{{ include "heli-os.fullname" . }}-postgres:5432/heli_os"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fusion.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fusion.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heli-os.fullname" . }}-fusion
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
spec:
  selector:
    app: fusion
  ports:
    - name: http
      port: {{ .Values.fusion.port }}
      targetPort: {{ .Values.fusion.port }}
