apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "heli-os.fullname" . }}-intelligence
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
    app: intelligence
spec:
  replicas: {{ .Values.intelligence.replicas }}
  selector:
    matchLabels:
      app: intelligence
  template:
    metadata:
      labels:
        app: intelligence
    spec:
      securityContext:
        {{- include "summit-os.podSecurityContext" . | nindent 8 }}
      containers:
        - name: intelligence
          image: {{ .Values.global.image.registry }}{{ .Values.intelligence.image }}
          securityContext:
            {{- include "summit-os.containerSecurityContext" . | nindent 12 }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.intelligence.port }}
          resources:
            {{- toYaml .Values.intelligence.resources | nindent 12 }}
          env:
            - name: REDIS_URL
              value: {{ .Values.global.env.REDIS_URL | quote }}
            - name: INFERENCE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: INFERENCE_URL
            - name: OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: OTLP_ENDPOINT
            {{- if .Values.intelligence.env }}
            {{- range $k, $v := .Values.intelligence.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "heli-os.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@{{ include "heli-os.fullname" . }}-postgres:5432/heli_os"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.intelligence.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.intelligence.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heli-os.fullname" . }}-intelligence
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
spec:
  selector:
    app: intelligence
  ports:
    - name: http
      port: {{ .Values.intelligence.port }}
      targetPort: {{ .Values.intelligence.port }}
