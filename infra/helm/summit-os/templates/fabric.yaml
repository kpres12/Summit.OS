apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "summit-os.fullname" . }}-fabric
  labels:
    {{- include "summit-os.labels" . | nindent 4 }}
    app: fabric
spec:
  replicas: {{ .Values.fabric.replicas }}
  selector:
    matchLabels:
      app: fabric
  template:
    metadata:
      labels:
        app: fabric
    spec:
      containers:
        - name: fabric
          image: {{ .Values.global.image.registry }}{{ .Values.fabric.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.fabric.port }}
          resources:
            {{- toYaml .Values.fabric.resources | nindent 12 }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "summit-os.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: FABRIC_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "summit-os.fullname" . }}-secrets
                  key: FABRIC_JWT_SECRET
            - name: REDIS_URL
              value: {{ .Values.global.env.REDIS_URL | quote }}
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@summit-postgres:5432/summit_os"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fabric.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fabric.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "summit-os.fullname" . }}-fabric
  labels:
    {{- include "summit-os.labels" . | nindent 4 }}
spec:
  selector:
    app: fabric
  ports:
    - name: http
      port: {{ .Values.fabric.port }}
      targetPort: {{ .Values.fabric.port }}
