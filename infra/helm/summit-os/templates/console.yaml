apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "heli-os.fullname" . }}-console
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
    app: console
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      containers:
        - name: console
          image: {{ .Values.global.image.registry }}{{ .Values.console.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.console.port }}
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: API_GATEWAY_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "heli-os.configmapName" . }}
                  key: FABRIC_WS_URL
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.console.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.console.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heli-os.fullname" . }}-console
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
spec:
  selector:
    app: console
  ports:
    - name: http
      port: {{ .Values.console.port }}
      targetPort: {{ .Values.console.port }}
