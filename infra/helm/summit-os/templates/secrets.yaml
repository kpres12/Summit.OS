apiVersion: v1
kind: Secret
metadata:
  name: {{ include "heli-os.fullname" . }}-secrets
  labels:
    {{- include "heli-os.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  FABRIC_JWT_SECRET: {{ .Values.secrets.fabricJwtSecret | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
