{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "summit-os.fullname" . }}
  labels:
    {{- include "summit-os.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ include "summit-os.fullname" . }}-tls
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: >-
                  {{- if eq .service "console" }}
                  {{ include "summit-os.fullname" $ }}-console
                  {{- else if eq .service "apiGateway" }}
                  {{ include "summit-os.fullname" $ }}-api-gateway
                  {{- else }}
                  {{ include "summit-os.fullname" $ }}-{{ .service }}
                  {{- end }}
                port:
                  number: >-
                    {{- if eq .service "console" }}
                    {{ $.Values.console.port }}
                    {{- else if eq .service "apiGateway" }}
                    {{ $.Values.apiGateway.port }}
                    {{- else }}
                    80
                    {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
