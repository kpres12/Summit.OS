# Traefik static configuration for Summit.OS
# Provides HTTPS termination + automatic Let's Encrypt certificates.
#
# Usage:
#   Local dev (HTTP):   just run docker compose up — Traefik serves on :80
#   Production (HTTPS): set ACME_EMAIL and DOMAIN in .env, then:
#                       docker compose --profile traefik up
#
# Traefik dashboard:  http://localhost:8080  (local only, secured in prod)

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true
  insecure: true    # dashboard on :8080 without auth — set insecure: false in prod

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

  metrics:
    address: ":8082"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: summit_net

  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
