# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  redis_data:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  tile_cache:      # nginx tile cache — survives container restarts
  tile_pmtiles:    # optional PMTiles archives for fully offline basemaps

networks:
  summit-internal:
    driver: bridge
  coolify:
    external: true  # Coolify creates this — gives Traefik access to the console container
