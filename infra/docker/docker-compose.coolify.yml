# Heli.OS — Coolify Deployment Compose
#
# HOW TO DEPLOY ON COOLIFY
# ─────────────────────────
# 1. In Coolify: New Resource → Docker Compose → paste this file
# 2. Set all environment variables in Coolify's "Environment Variables" panel
#    (see the ${VAR:-default} placeholders below for what's required)
# 3. Point your domain at the Coolify server. Coolify's built-in Traefik
#    handles SSL automatically — no extra config needed.
# 4. Click Deploy.
#
# REQUIRED ENV VARS (set in Coolify UI)
# ─────────────────────────────────────
#   POSTGRES_PASSWORD      — strong random password
#   FABRIC_JWT_SECRET      — openssl rand -hex 32
#   SECRET_KEY             — openssl rand -hex 32
#   DOMAIN                 — your domain, e.g. summit.yourdomain.com
#
# BILLING (set after running scripts/setup-polar.sh)
#   POLAR_ACCESS_TOKEN     — polar_at_... (from polar.sh → Settings → API)
#   POLAR_WEBHOOK_SECRET   — from polar.sh → Settings → Webhooks
#   POLAR_PRODUCT_ID_PRO   — from scripts/setup-polar.sh output
#   POLAR_PRODUCT_ID_ORG   — from scripts/setup-polar.sh output
#   POLAR_PRODUCT_ID_ENTERPRISE — from scripts/setup-polar.sh output
#
# ENTERPRISE (optional, defaults to community mode)
#   ENTERPRISE_MULTI_TENANT=true   — unlocks multi-org management
#   API_KEY_ENFORCE=true           — enforces billing tier on every request
#
# OIDC (optional — skip for username/password auth)
#   OIDC_ISSUER_URL        — e.g. https://accounts.google.com
#   OIDC_CLIENT_ID
#   OIDC_CLIENT_SECRET
#
# NOTES
# ─────
# • Coolify labels below wire each service into Traefik automatically.
# • The console is the only public-facing service. All others are internal.
# • Postgres data, Redis data, and MQTT data are persisted via named volumes.

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  # Offline map tile cache — caches Carto tiles to disk so the operator
  # console works with zero internet access. Warm the cache before going
  # offline: infra/tiles/download-tiles.sh --warm-cache --bbox <your area>
  tile-cache:
    image: nginx:alpine
    restart: always
    volumes:
      - ../../infra/tiles/nginx-tile-cache.conf:/etc/nginx/conf.d/default.conf:ro
      - tile_cache:/var/cache/nginx/tiles
      - tile_pmtiles:/data/tiles
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - summit-internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-summitredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-summitredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summit-internal

  postgres:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_DB: heli_os
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit -d heli_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summit-internal

  mqtt:
    image: eclipse-mosquitto:2.0
    restart: always
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - summit-internal

  # ── Core Application Services ───────────────────────────────────────────────

  fabric:
    image: ${FABRIC_IMAGE:-ghcr.io/bigmt-ai/heli-os/fabric:latest}
    restart: always
    environment:
      FABRIC_REDIS_URL: redis://:${REDIS_PASSWORD:-summitredis}@redis:6379
      FABRIC_MQTT_BROKER: mqtt
      FABRIC_MQTT_PORT: "1883"
      FABRIC_JWT_SECRET: ${FABRIC_JWT_SECRET:?FABRIC_JWT_SECRET is required}
      ENTERPRISE_MULTI_TENANT: ${ENTERPRISE_MULTI_TENANT:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - summit-internal

  api-gateway:
    image: ${API_GATEWAY_IMAGE:-ghcr.io/bigmt-ai/heli-os/api-gateway:latest}
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://summit:${POSTGRES_PASSWORD}@postgres:5432/heli_os
      REDIS_URL: redis://:${REDIS_PASSWORD:-summitredis}@redis:6379
      FABRIC_WS_URL: ws://fabric:8001/ws
      FABRIC_HTTP_URL: http://fabric:8001
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ENFORCE: ${OIDC_ENFORCE:-false}
      RBAC_ENFORCE: ${RBAC_ENFORCE:-false}
      API_KEY_ENFORCE: ${API_KEY_ENFORCE:-false}
      ENTERPRISE_MULTI_TENANT: ${ENTERPRISE_MULTI_TENANT:-false}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      POLAR_PRODUCT_ID_PRO: ${POLAR_PRODUCT_ID_PRO:-}
      POLAR_PRODUCT_ID_ORG: ${POLAR_PRODUCT_ID_ORG:-}
      POLAR_PRODUCT_ID_ENTERPRISE: ${POLAR_PRODUCT_ID_ENTERPRISE:-}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    depends_on:
      postgres:
        condition: service_healthy
      fabric:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - summit-internal

  console:
    image: ${CONSOLE_IMAGE:-ghcr.io/bigmt-ai/heli-os/console:latest}
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:?DOMAIN is required}
      NEXT_PUBLIC_WS_URL: wss://${DOMAIN}/ws
      NEXT_PUBLIC_OIDC_ISSUER: ${OIDC_ISSUER_URL:-}
      NEXT_PUBLIC_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      NEXT_PUBLIC_TIER: ${ENTERPRISE_MULTI_TENANT:-false}
      # Offline map tiles — points to local nginx cache proxy
      # Leave blank to use Carto CDN (requires internet)
      # Set to http://tile-cache/tiles/style.json for fully offline ops
      NEXT_PUBLIC_TILE_URL: ${TILE_URL:-}
    depends_on:
      api-gateway:
        condition: service_healthy
    labels:
      # Coolify / Traefik routing — console is the public entry point
      - "traefik.enable=true"
      - "traefik.http.routers.summit-console.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.summit-console.entrypoints=websecure"
      - "traefik.http.routers.summit-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.summit-console.loadbalancer.server.port=3000"
      # API reverse proxy — /v1/* and /api/* to api-gateway (same domain, no CORS)
      - "traefik.http.routers.summit-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/v1`) || PathPrefix(`/api`) || PathPrefix(`/health`))"
      - "traefik.http.routers.summit-api.entrypoints=websecure"
      - "traefik.http.routers.summit-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.summit-api.service=summit-api-svc"
      - "traefik.http.services.summit-api-svc.loadbalancer.server.port=8000"
      # WebSocket proxy — /ws to fabric
      - "traefik.http.routers.summit-ws.rule=Host(`${DOMAIN}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.summit-ws.entrypoints=websecure"
      - "traefik.http.routers.summit-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.summit-ws.service=summit-ws-svc"
      - "traefik.http.services.summit-ws-svc.loadbalancer.server.port=8001"
    networks:
      - summit-internal
      - coolify  # Coolify's public Traefik network

