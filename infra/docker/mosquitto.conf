# Mosquitto MQTT Broker Configuration for Summit.OS
#
# SECURITY NOTE: This configuration uses plaintext MQTT (port 1883) with
# anonymous access. This is safe for local development where the broker
# is not reachable from outside Docker's internal network.
#
# FOR PRODUCTION: Replace the listeners below with the TLS block.
# Generate certs: scripts/gen_mqtt_certs.sh (creates infra/docker/certs/)
#
# --- Production TLS config (uncomment and remove the dev block above) ---
# listener 8883
# protocol mqtt
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false       # set true to require client certs (mTLS)
# allow_anonymous false
# password_file /mosquitto/config/passwd
#
# listener 9001
# protocol websockets
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# -------------------------------------------------------------------------

# Dev-mode settings (plaintext — do not expose to external networks)
listener 1883
allow_anonymous true
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections 1000
max_inflight_messages 100
max_queued_messages 1000

# Message size limits (max_packet_size replaces message_size_limit in newer versions)
max_packet_size 268435456  # 256MB
