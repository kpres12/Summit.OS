# Heli.OS — TAK Server Interop Test Stack
#
# Stands up a minimal CoT TCP stub alongside Heli.OS so we can validate
# atak_adapter.py end-to-end. Use:
#
#   docker compose -f infra/docker/docker-compose.tak.yml up -d tak-server
#   ATAK_SERVER_HOST=localhost ATAK_SERVER_PORT=8087 \
#     pytest tests/integration/test_atak_interop.py -v
#
# For production demos use the official Java TAK Server (tak.gov) or
# the taky reference server (github.com/tkuester/taky) with proper certs.
# The stub here is sufficient to validate the adapter's connect / CoT
# publish / CoT receive / disconnect paths.

services:
  tak-server:
    build:
      context: tak_stub
      dockerfile: Dockerfile
    image: heli-tak-stub:latest
    container_name: heli-tak-server
    ports:
      - "8087:8087"     # CoT TCP (clear)
    networks:
      - heli-tak
    restart: unless-stopped

networks:
  heli-tak:
    driver: bridge
