# Heli.OS — Docker Compose
#
# PROFILES
# --------
# (no profile)          Minimal — postgres, redis, mqtt, fabric, api-gateway, console
#                       Gives you the real-time map + auth. Fast first-run experience.
#
# --profile full        Everything — adds fusion, intelligence, tasking, inference,
#                       adapters (OpenSky/CelesTrak), plainview-adapter, keycloak-init
#
# --profile observability  Adds Prometheus, Alertmanager, Grafana, OPA, Jaeger
#
# --profile llm         Adds Ollama (local LLM brain — pull model after first start:
#                       docker compose --profile llm exec ollama ollama pull llama3.1)
#
# --profile traefik     Adds Traefik HTTPS reverse proxy (set DOMAIN + ACME_EMAIL in .env)
#
# --profile keycloak    Adds Keycloak DB init (needed when wiring external Keycloak OIDC)
#
# --profile mtls        Adds nginx mTLS front-proxies
#
# EXAMPLES
# --------
#   docker compose up                                    # minimal, just the UI
#   docker compose --profile full up                     # full intelligence stack
#   docker compose --profile full --profile observability up  # full + monitoring

services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: summit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgis/postgis:15-3.3
    container_name: summit-postgres
    environment:
      POSTGRES_DB: heli_os
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-summit_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/postgres/ssl:/etc/postgresql/ssl:ro
    # Enable SSL — generate certs first: bash infra/postgres/generate-ssl-certs.sh
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/postgresql/ssl/server.crt
      -c ssl_key_file=/etc/postgresql/ssl/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit -d heli_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: summit-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto -h >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time init: create the keycloak database in Postgres
  # Only needed when running Keycloak OIDC. Enable with: --profile keycloak
  keycloak-db-init:
    image: postgres:15-alpine
    container_name: summit-keycloak-db-init
    profiles: ["keycloak", "full"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-summit_password}
    command: >
      sh -c "psql -h postgres -U summit -d heli_os -c \"SELECT 1 FROM pg_database WHERE datname='keycloak'\" | grep -q 1 || psql -h postgres -U summit -d heli_os -c \"CREATE DATABASE keycloak OWNER summit\""
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Heli.OS Services
  fabric:
    build:
      context: ../../apps/fabric
      dockerfile: Dockerfile
    container_name: summit-fabric
    ports:
      - "8001:8001"
    environment:
      - FABRIC_REDIS_URL=redis://redis:6379
      - FABRIC_MQTT_BROKER=mqtt
      - FABRIC_MQTT_PORT=1883
      - POSTGRES_URL=postgresql://heli:${POSTGRES_PASSWORD:-summit_password}@postgres:5432/heli_os?sslmode=require
      - FABRIC_JWT_SECRET=${FABRIC_JWT_SECRET:-dev_secret}
      - FABRIC_SKIP_MIGRATIONS=${FABRIC_SKIP_MIGRATIONS:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - ENTERPRISE_MULTI_TENANT=${ENTERPRISE_MULTI_TENANT:-false}
      - PYTHONPATH=/workspace:/app
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - ../../apps/fabric:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  fusion:
    build:
      context: ../../apps/fusion
      dockerfile: Dockerfile
    profiles: ["full"]
    container_name: summit-fusion
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
      - POSTGRES_URL=postgresql://heli:${POSTGRES_PASSWORD:-summit_password}@postgres:5432/heli_os?sslmode=require
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - OBSERVATION_SCHEMA_PATH=/contracts/jsonschemas/observation.schema.json
      - FUSION_ENABLE_VISION_AI=${FUSION_ENABLE_VISION_AI-false}
      - FUSION_ENABLE_TRACKING=${FUSION_ENABLE_TRACKING-true}
      - MODEL_REGISTRY=${MODEL_REGISTRY-/models}
      - FUSION_MODEL_PATH=${FUSION_MODEL_PATH-}
      - FUSION_CONF_THRESHOLD=${FUSION_CONF_THRESHOLD-0.6}
      - INFERENCE_URL=http://inference:8006
      - PYTHONPATH=/workspace:/app
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - ../../apps/fusion:/app
      - ../../packages/contracts:/contracts
      - ../../models:/models
    command: uvicorn main:app --host 0.0.0.0 --port 8002 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  intelligence:
    build:
      context: ../../apps/intelligence
      dockerfile: Dockerfile
    profiles: ["full"]
    container_name: summit-intelligence
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
      - POSTGRES_URL=postgresql://heli:${POSTGRES_PASSWORD:-summit_password}@postgres:5432/heli_os?sslmode=require
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - INTELLIGENCE_ENABLE_XGB=${INTELLIGENCE_ENABLE_XGB-false}
      - MODEL_REGISTRY=${MODEL_REGISTRY-/models}
      - INTELLIGENCE_MODEL_PATH=${INTELLIGENCE_MODEL_PATH-}
      - PLANNER_MODEL_PATH=/ml-models/mission_classifier.onnx
      - FABRIC_URL=http://fabric:8001
      - TASKING_URL=http://tasking:8004
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - PYTHONPATH=/workspace:/app
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - ../../apps/intelligence:/app
      - ../../models:/models
      - ../../packages/ml/models:/ml-models:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8003 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  tasking:
    build:
      context: ../../apps/tasking
      dockerfile: Dockerfile
      args:
        INCLUDE_PYMAVLINK: ${INCLUDE_PYMAVLINK-false}
    profiles: ["full"]
    container_name: summit-tasking
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
      - POSTGRES_URL=postgresql://heli:${POSTGRES_PASSWORD:-summit_password}@postgres:5432/heli_os?sslmode=require
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - TASKING_DIRECT_AUTOPILOT=${TASKING_DIRECT_AUTOPILOT-false}
      - ENTERPRISE_MULTI_TENANT=${ENTERPRISE_MULTI_TENANT:-false}
      - PYTHONPATH=/workspace:/app
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - ../../apps/tasking:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8004 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Plainview Intelligence Adapter
  plainview-adapter:
    build:
      context: ../../apps/plainview-adapter
      dockerfile: Dockerfile
    profiles: ["full"]
    container_name: summit-plainview-adapter
    ports:
      - "8005:8005"
    environment:
      - INTELLIGENCE_URL=http://intelligence:8003
      - PLAINVIEW_API_URL=http://host.docker.internal:4000
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER=mqtt://mqtt:1883
    depends_on:
      redis:
        condition: service_healthy
      intelligence:
        condition: service_started
    volumes:
      - ../../apps/plainview-adapter:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8005 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Inference Service (AI model serving)
  inference:
    build:
      context: ../../apps/inference
      dockerfile: Dockerfile
    profiles: ["full"]
    container_name: summit-inference
    ports:
      - "8006:8006"
    environment:
      - MODEL_PATH=/models/yolov8n.onnx
      - MODEL_REGISTRY=/models
      - PYTHONPATH=/workspace:/app
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../:/workspace
      - ../../apps/inference:/app
      - ../../models:/models
    command: uvicorn main:app --host 0.0.0.0 --port 8006 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # API Gateway
  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    container_name: summit-api-gateway
    ports:
      - "8000:8000"
    environment:
      FABRIC_URL: http://fabric:8001
      FUSION_URL: http://fusion:8002
      INTELLIGENCE_URL: http://intelligence:8003
      TASKING_URL: http://tasking:8004
      INFERENCE_URL: http://inference:8006
      POSTGRES_URL: postgresql://heli:${POSTGRES_PASSWORD:-summit_password}@postgres:5432/heli_os?sslmode=require
      MISSIONS: sentinel
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      API_KEY_ENFORCE: ${API_KEY_ENFORCE:-false}
      ENTERPRISE_MULTI_TENANT: ${ENTERPRISE_MULTI_TENANT:-false}
      PYTHONPATH: /workspace:/app
      OTLP_ENDPOINT: http://jaeger:4317
      GEOIP_DB_PATH: /geoip/GeoLite2-Country.mmdb
      # Audit log S3 shipping (optional — set to enable)
      AWS_AUDIT_BUCKET: ${AWS_AUDIT_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Secrets backend (optional — Vault or Infisical)
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENVIRONMENT: ${INFISICAL_ENVIRONMENT:-production}
      # YubiKey OTP validation
      YUBICO_CLIENT_ID: ${YUBICO_CLIENT_ID:-}
      YUBICO_SECRET_KEY: ${YUBICO_SECRET_KEY:-}
    depends_on:
      fabric:
        condition: service_started
      postgres:
        condition: service_healthy
      # fusion, intelligence, tasking are full-profile services — api-gateway
      # starts without them (their endpoints return 502 until --profile full)
    volumes:
      - ../../:/workspace
      - ../../apps/api-gateway:/app
      - ../../infra/geoip:/geoip:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`, `/v1`, `/health`, `/docs`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=secure-headers@file,rate-limit@file,compress@file"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 $( [ "${UVICORN_RELOAD:-false}" = "true" ] && echo "--reload" || echo "" )
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Console
  console:
    build:
      context: ../../apps/console
      dockerfile: Dockerfile
    container_name: summit-console
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      - api-gateway
    volumes:
      - ../../apps/console:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Optional mTLS front proxies (enable with: docker-compose ... --profile mtls up)
  api-proxy:
    image: nginx:1.25-alpine
    container_name: summit-api-proxy
    profiles: ["mtls"]
    depends_on:
      - api-gateway
    ports:
      - "8443:8443"
    volumes:
      - ../../infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/proxy/certs:/certs:ro

  fabric-proxy:
    image: nginx:1.25-alpine
    container_name: summit-fabric-proxy
    profiles: ["mtls"]
    depends_on:
      - fabric
    ports:
      - "8451:8443"
    volumes:
      - ../../infra/proxy/nginx-fabric.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/proxy/certs:/certs:ro

  fusion-proxy:
    image: nginx:1.25-alpine
    container_name: summit-fusion-proxy
    profiles: ["mtls"]
    depends_on:
      - fusion
    ports:
      - "8452:8443"
    volumes:
      - ../../infra/proxy/nginx-fusion.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/proxy/certs:/certs:ro

  intelligence-proxy:
    image: nginx:1.25-alpine
    container_name: summit-intelligence-proxy
    profiles: ["mtls"]
    depends_on:
      - intelligence
    ports:
      - "8453:8443"
    volumes:
      - ../../infra/proxy/nginx-intelligence.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/proxy/certs:/certs:ro

  tasking-proxy:
    image: nginx:1.25-alpine
    container_name: summit-tasking-proxy
    profiles: ["mtls"]
    depends_on:
      - tasking
    ports:
      - "8454:8443"
    volumes:
      - ../../infra/proxy/nginx-tasking.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/proxy/certs:/certs:ro

  # External Data Adapters (OpenSky, CelesTrak)
  adapters:
    build:
      context: ../../adapters
      dockerfile: Dockerfile
    profiles: ["full"]
    container_name: summit-adapters
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - OPENSKY_ENABLED=${OPENSKY_ENABLED:-true}
      - OPENSKY_POLL_INTERVAL=${OPENSKY_POLL_INTERVAL:-10}
      - OPENSKY_BBOX=${OPENSKY_BBOX:-}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID:-}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET:-}
      - CELESTRAK_ENABLED=${CELESTRAK_ENABLED:-true}
      - CELESTRAK_MAX_SATS=${CELESTRAK_MAX_SATS:-200}
      - CELESTRAK_PROPAGATE_INTERVAL=${CELESTRAK_PROPAGATE_INTERVAL:-30}
      - CELESTRAK_GROUP=${CELESTRAK_GROUP:-active}
      - AIS_ENABLED=${AIS_ENABLED:-true}
      - AIS_BBOX=${AIS_BBOX:-}
      - AISHUB_USERNAME=${AISHUB_USERNAME:-}
      - INFERENCE_URL=http://inference:8006
      - CAMERA_ENABLED=${CAMERA_ENABLED:-false}
      - CAMERA_RTSP_URL=${CAMERA_RTSP_URL:-}
    depends_on:
      mqtt:
        condition: service_healthy
      inference:
        condition: service_started
    restart: unless-stopped

  # Observability  (enable with: --profile observability)
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability", "full"]
    container_name: summit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ["observability", "full"]
    container_name: summit-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability", "full"]
    container_name: summit-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  opa:
    image: openpolicyagent/opa:latest-rootless
    profiles: ["observability", "full"]
    container_name: summit-opa
    command: ["run", "--server", "/policy/policy.rego"]
    ports:
      - "8181:8181"
    volumes:
      - ../../infra/policy:/policy:ro

  jaeger:
    image: jaegertracing/all-in-one:1.52
    profiles: ["observability", "full"]
    container_name: summit-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Optional: local LLM (enable with: docker compose --profile llm up) ──────
  # Provides the autonomous mission brain (Ollama + llama3.1).
  # Without this, Heli.OS runs fully on rule-based + trained ML dispatch.
  # First run: docker compose --profile llm exec ollama ollama pull llama3.1
  ollama:
    image: ollama/ollama:latest
    container_name: summit-ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Traefik reverse proxy + HTTPS termination ────────────────────────────────
  # Enable with: docker compose --profile traefik up
  # Local dev:   HTTP only (no ACME_EMAIL needed)
  # Production:  Set ACME_EMAIL and DOMAIN in .env — Let's Encrypt auto-provisions
  traefik:
    image: traefik:v3.1
    container_name: summit-traefik
    profiles: ["traefik"]
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # Traefik dashboard (disable in prod: set api.insecure: false)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../../infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-}
      DOMAIN: ${DOMAIN:-localhost}
    restart: unless-stopped

  # ── GeoIP auto-updater ──────────────────────────────────────────────────────
  # Uses MaxMind's official geoipupdate image.
  # Checks for a new database every 24h; MaxMind publishes on Tuesdays ~2x/month.
  # Set MAXMIND_ACCOUNT_ID and MAXMIND_LICENSE_KEY in .env to activate.
  # Without credentials, this container exits cleanly and geoblocking still works
  # off whatever .mmdb is already in infra/geoip/.
  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: summit-geoipupdate
    environment:
      GEOIPUPDATE_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-0}
      GEOIPUPDATE_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      GEOIPUPDATE_EDITION_IDS: GeoLite2-Country
      GEOIPUPDATE_FREQUENCY: 24        # check every 24 hours
      GEOIPUPDATE_PRESERVE_FILE_TIMES: "1"
    volumes:
      - ../../infra/geoip:/usr/share/GeoIP
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log:
  ollama_data:
  traefik_letsencrypt:
