# Summit.OS Tile Cache Proxy
#
# This nginx config sits between the operator console and the upstream tile
# provider (Carto, OSM, etc.). It caches every tile to disk so that:
#
#   1. Tiles viewed while online are cached locally
#   2. Those same tiles load instantly offline — no internet needed
#   3. The operator can "warm" the cache before entering a dead zone by
#      panning across the operational area at all zoom levels
#
# Cache storage: /var/cache/nginx/tiles
# Cache TTL: 30 days (tiles rarely change)
# Max cache size: 10GB (adjust to available disk)
#
# Used by:
#   infra/docker/docker-compose.coolify.yml  (tile-cache service)
#   NEXT_PUBLIC_TILE_URL=http://localhost:8089/tiles/
#
# Tile source (upstream):
#   Default: Carto Dark Matter (free, no API key)
#   Swap TILES_UPSTREAM in docker-compose to use OSM, Stamen, etc.

proxy_cache_path /var/cache/nginx/tiles
    levels=1:2
    keys_zone=tiles:50m
    max_size=10g
    inactive=30d
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/styles
    levels=1:2
    keys_zone=styles:10m
    max_size=500m
    inactive=7d
    use_temp_path=off;

server {
    listen 80;
    server_name _;

    # ── Map style JSON ──────────────────────────────────────────────────────
    # The MapLibre style JSON references tile URLs — we rewrite them to
    # point back through this proxy so tile requests are also cached.

    location /tiles/style.json {
        proxy_pass https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json;
        proxy_cache styles;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # Rewrite tile URLs in the style JSON to go through this proxy
        sub_filter_once off;
        sub_filter_types application/json;
        sub_filter 'https://basemaps.cartocdn.com'
                   'http://$host/tiles';
        sub_filter 'https://tiles.basemaps.cartocdn.com'
                   'http://$host/tiles';

        add_header X-Cache-Status $upstream_cache_status;
        add_header Access-Control-Allow-Origin *;
        resolver 8.8.8.8 valid=300s;
    }

    # ── Map tiles ───────────────────────────────────────────────────────────

    location /tiles/ {
        # Strip the /tiles/ prefix and proxy to Carto
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass https://basemaps.cartocdn.com;

        proxy_cache tiles;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Cache key: method + host + URI (no query strings for tiles)
        proxy_cache_key "$request_method$host$uri";

        proxy_set_header Host basemaps.cartocdn.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin *;

        resolver 8.8.8.8 valid=300s;

        # Serve from cache even when upstream is unreachable (offline mode)
        proxy_intercept_errors on;
        error_page 502 503 504 = @offline_tiles;
    }

    # ── Offline fallback ────────────────────────────────────────────────────
    # When upstream is unreachable AND no cached tile exists,
    # return a transparent 256x256 PNG rather than a broken image.

    location @offline_tiles {
        # Try to serve from cache one more time (expired entries)
        proxy_cache_use_stale any;
        return 204;  # No content — MapLibre renders as blank tile
    }

    # ── PMTiles serving (optional) ──────────────────────────────────────────
    # If you've downloaded a .pmtiles file (see scripts/download-tiles.sh),
    # place it at /data/tiles/region.pmtiles and point MapLibre to:
    #   pmtiles://http://localhost:8089/pmtiles/region.pmtiles
    # or serve via the pmtiles HTTP range endpoint below.

    location /pmtiles/ {
        alias /data/tiles/;
        add_header Access-Control-Allow-Origin *;
        add_header Accept-Ranges bytes;
        # Range requests required for PMTiles protocol
        autoindex off;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "tile-cache-ok\n";
        add_header Content-Type text/plain;
    }

    # ── Cache stats ─────────────────────────────────────────────────────────
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}
