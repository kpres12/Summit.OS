apiVersion: apps/v1
kind: Deployment
metadata:
  name: summit-tasking
  labels:
    app: summit-tasking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summit-tasking
  template:
    metadata:
      labels:
        app: summit-tasking
    spec:
      containers:
        - name: tasking
          image: ghcr.io/bigmt/summit-tasking:latest
          ports:
            - containerPort: 8004
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: REDIS_URL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: summit-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@summit-postgres:5432/summit_os"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: summit-tasking
spec:
  selector:
    app: summit-tasking
  ports:
    - name: http
      port: 8004
      targetPort: 8004
