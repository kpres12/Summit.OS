apiVersion: apps/v1
kind: Deployment
metadata:
  name: summit-api-gateway
  labels:
    app: summit-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: summit-api-gateway
  template:
    metadata:
      labels:
        app: summit-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/bigmt/summit-api-gateway:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: FABRIC_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: FABRIC_URL
            - name: FUSION_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: FUSION_URL
            - name: INTELLIGENCE_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: INTELLIGENCE_URL
            - name: TASKING_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: TASKING_URL
            - name: API_KEY_ENFORCE
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: API_KEY_ENFORCE
            - name: OIDC_ENFORCE
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: OIDC_ENFORCE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: summit-secrets
                  key: POSTGRES_PASSWORD
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: summit-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@summit-postgres:5432/summit_os"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: summit-api-gateway
spec:
  selector:
    app: summit-api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
