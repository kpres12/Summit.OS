apiVersion: apps/v1
kind: Deployment
metadata:
  name: summit-intelligence
  labels:
    app: summit-intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summit-intelligence
  template:
    metadata:
      labels:
        app: summit-intelligence
    spec:
      containers:
        - name: intelligence
          image: ghcr.io/bigmt/summit-intelligence:latest
          ports:
            - containerPort: 8003
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: summit-config
                  key: REDIS_URL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: summit-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://summit:$(POSTGRES_PASSWORD)@summit-postgres:5432/summit_os"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: summit-intelligence
spec:
  selector:
    app: summit-intelligence
  ports:
    - name: http
      port: 8003
      targetPort: 8003
