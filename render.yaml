services:
  - type: web
    name: heliOS
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: FABRIC_JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENSKY_ENABLED
        value: "true"
      - key: OPENSKY_CLIENT_ID
        value: "yekaneast-api-client"
      - key: OPENSKY_CLIENT_SECRET
        sync: false
      - key: OPENSKY_POLL_INTERVAL
        value: "10"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
