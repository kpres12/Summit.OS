[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "summit-os-client"
version = "0.1.0a1"
description = "Async Python SDK client for Summit.OS distributed intelligence fabric"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Big Mountain Technologies", email = "sdk@bigmt.ai"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: System :: Distributed Computing",
    "Typing :: Typed",
]

dependencies = []

[project.optional-dependencies]
http = ["aiohttp>=3.9.0"]
all = ["aiohttp>=3.9.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://github.com/bigmt/summit-os"
Documentation = "https://github.com/bigmt/summit-os/blob/main/docs/SDK_QUICKSTART.md"
Changelog = "https://github.com/bigmt/summit-os/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
include = ["summit_sdk*"]

[tool.setuptools.package-data]
summit_sdk = ["py.typed"]
