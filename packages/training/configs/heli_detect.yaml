# Heli.OS unified aerial detection dataset
# Merges VisDrone2019 + D-Fire + HERIDAL into 4 classes.
# Generated by datasets/visdrone.py, datasets/dfire.py, datasets/heridal.py.

path: /tmp/heli-training-data/heli_detect  # overridden by train_detection.py at runtime
train: images/train
val: images/val
test: images/test

nc: 4
names:
  0: person    # VisDrone pedestrian+people, HERIDAL person
  1: vehicle   # VisDrone car+van+truck+bus
  2: fire      # D-Fire fire
  3: smoke     # D-Fire smoke
